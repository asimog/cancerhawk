<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cancer Research Babel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0208;
      --bg-secondary: #0a0a0a;
      --primary: #00ff41;
      --secondary: #008f11;
      --text: #e0e0e0;
      --text-dim: #666;
      --border: #1a3a1a;
      --hover: #0d1f0d;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .research-dashboard {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .research-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-secondary);
      text-align: center;
    }

    .research-header h1 {
      color: var(--primary);
      font-size: 2.5em;
      margin-bottom: 10px;
      text-shadow: 0 0 20px var(--primary);
    }

    .research-header p {
      color: var(--text-dim);
      font-size: 1.2em;
    }

    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 15px;
      font-size: 1.1em;
      color: var(--primary);
    }

    .research-main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 20px;
      padding: 20px;
      overflow-y: auto;
    }

    .panel {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      overflow-y: auto;
    }

    .panel h2 {
      color: var(--primary);
      margin-bottom: 15px;
      font-size: 1.5em;
    }

    .current-block-panel {
      grid-column: 1 / -1;
    }

    .leaderboard-panel {
      grid-row: 2;
      grid-column: 1;
    }

    .recent-blocks-panel {
      grid-row: 2;
      grid-column: 2;
    }

    #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    .floating-display {
      position: fixed;
      bottom: 10px;
      right: 10px;
      background: rgba(0,0,0,0.9);
      color: var(--primary);
      padding: 15px;
      border-radius: 8px;
      max-width: 400px;
      font-size: 12px;
      border: 1px solid var(--primary);
      z-index: 1000;
    }

    .floating-display button {
      background: var(--primary);
      color: black;
      border: none;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .agent-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 8px;
    }

    .agent-card.top {
      border-color: var(--primary);
      background: rgba(0,255,65,0.1);
    }

    .block-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 8px;
    }

    .winner-badge {
      background: var(--primary);
      color: black;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.8em;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <canvas id="particle-canvas"></canvas>

  <div class="research-dashboard">
    <header class="research-header">
      <h1>🧬 Cancer Research Babel</h1>
      <p>Autonomous Multi-Agent Cancer Research Simulation</p>
      <div class="stats-bar">
        <span id="block-count">Blocks: 0</span>
        <span id="agent-count">Agents: 0</span>
        <span id="total-tokens">Tokens: 0</span>
      </div>
    </header>

    <main class="research-main">
      <div class="panel current-block-panel">
        <h2>Current Research Block</h2>
        <div id="current-block-content">
          <p>Initializing simulation...</p>
        </div>
      </div>

      <div class="panel leaderboard-panel">
        <h2>Agent Leaderboard</h2>
        <div id="leaderboard-content">
          <p>Loading agents...</p>
        </div>
      </div>

      <div class="panel recent-blocks-panel">
        <h2>Recent Research Blocks</h2>
        <div id="recent-blocks-content">
          <p>No completed blocks yet...</p>
        </div>
      </div>
    </main>

    <!-- Floating Research Display -->
    <div id="research-display" class="floating-display">
      <button id="commit-btn">Commit Results</button>
      <div id="research-content"></div>
    </div>
  </div>

  <script src="cancer_research_babel.js"></script>
</body>
</html>
